# ============================================================================
# Blocks — full snippet templates inserted as list items
#
# `context` determines which completion context offers this block.
# `snippet` uses relative indentation (see rules at top of file).
# `filter` is the text the user types to trigger this (optional, defaults to name).
# ============================================================================

# --- fleet_maintained_apps blocks ---

[[blocks]]
context = "fleet_maintained_apps"
name = "macOS app"
description = "Fleet-maintained macOS app"
snippet = """
slug: ${1:slack/darwin}
  self_service: ${2:true}
  setup_experience: ${3:true}
  categories:
    - ${4:Communication}"""

[[blocks]]
context = "fleet_maintained_apps"
name = "Windows app"
description = "Fleet-maintained Windows app"
snippet = """
slug: ${1:slack/windows}
  self_service: ${2:true}
  setup_experience: ${3:true}
  categories:
    - ${4:Communication}
  labels_include_any:
    - "x86-based Windows hosts\""""

[[blocks]]
context = "fleet_maintained_apps"
name = "macOS app (ARM only)"
description = "Fleet-maintained macOS app restricted to Apple Silicon"
snippet = """
slug: ${1:docker-desktop/darwin}
  self_service: ${2:true}
  labels_include_any:
    - Apple Silicon macOS hosts
  categories:
    - ${3:Developer tools}"""

# --- packages blocks ---
# `{base}` is resolved at runtime to the relative path to the repo's
# lib directory (platforms/ or lib/) from the current file.

[[blocks]]
context = "packages"
name = "macOS package"
description = "Software package for macOS"
snippet = """
path: ${1:{base}/macos/software/app.yml}
  self_service: ${2:true}
  setup_experience: ${3:false}
  categories:
    - ${4:Productivity}"""

[[blocks]]
