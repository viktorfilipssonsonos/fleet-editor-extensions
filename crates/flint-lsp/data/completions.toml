# ============================================================================
# Globs — pattern suggestions for `paths:` values
#
# `context` matches against the parent context path from find_parent_context().
#
# Two directory conventions exist:
#   platforms/<os>/   (fleetctl new / swan-airlines style)
#   lib/<os>/         (older repos / fleet it-and-security style)
#
# The path prefix (../, ./, etc.) depends on the file location relative to
# the repo root. At runtime, the LSP should:
#   1. Detect whether the repo uses platforms/ or lib/
#   2. Compute the relative prefix from the current file
#   3. Assemble: {prefix}{base_dir}/{os}/{subdir}/{glob}
#
# In this file, patterns use `{root}` as a placeholder for the repo-relative
# path to the lib directory. The LSP replaces it at runtime.
# Fallback if detection fails: `../platforms/`
# ============================================================================

# Patterns use `{base}` as a placeholder for the repo's lib directory.
# At runtime the LSP detects whether the repo uses `platforms/` or `lib/`
# and computes the relative path from the current file.
# Example: editing fleets/workstations.yml → `{base}` = `../platforms`
#          editing default.yml             → `{base}` = `./platforms`
#          editing teams/ops.yml           → `{base}` = `../lib`

# --- apple_settings / macos_settings ---

[[globs]]
context = "apple_settings"
pattern = "{base}/macos/configuration-profiles/*.mobileconfig"
description = "macOS configuration profiles"

[[globs]]
context = "apple_settings"
pattern = "{base}/macos/declaration-profiles/*.json"
description = "macOS declaration profiles (DDM)"

[[globs]]
context = "apple_settings"
pattern = "{base}/ios/configuration-profiles/*.mobileconfig"
description = "iOS configuration profiles"

[[globs]]
context = "apple_settings"
pattern = "{base}/ios/declaration-profiles/*.json"
description = "iOS declaration profiles (DDM)"

[[globs]]
context = "apple_settings"
pattern = "{base}/ipados/configuration-profiles/*.mobileconfig"
description = "iPadOS configuration profiles"

[[globs]]
context = "apple_settings"
pattern = "{base}/ipados/declaration-profiles/*.json"
description = "iPadOS declaration profiles (DDM)"

# --- windows_settings ---

