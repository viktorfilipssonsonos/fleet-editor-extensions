# Flint LSP Completion Data
#
# This file is the single source of truth for all LSP completion snippets,
# field suggestions, glob patterns, category values, and label names.
#
# Embedded at compile time via include_str! — no runtime file I/O.
#
# ## Snippet indentation rules
#
# Block snippets use LSP's ADJUST_INDENTATION mode. The editor adds the
# cursor's base indentation to every line. Snippets only need RELATIVE
# indentation from the first line:
#
#   Line 1: no leading spaces (inserted at cursor position)
#   Line 2+: indented relative to line 1
#
# For list-item blocks (inserted after "- "), continuation lines need
# 2-space indent to align under the first key (past the "- " marker):
#
#   - slug: slack/darwin        ← line 1 (at cursor)
#     self_service: true        ← 2 spaces relative
#     categories:               ← 2 spaces relative
#       - Communication         ← 4 spaces relative
#
# Tab stops use LSP snippet syntax: ${1:default}, ${2:default}, etc.

# ============================================================================
# Categories — valid values for the `categories:` field
# ============================================================================

[categories]
values = [
  "Browsers",
  "Communication",
  "Developer tools",
  "Productivity",
  "Security",
  "Utilities",
]

# ============================================================================
# Labels — common Fleet label names suggested in labels_include_any/exclude_any
# ============================================================================

[[labels]]
name = "Apple Silicon macOS hosts"
description = "macOS hosts with ARM architecture"

[[labels]]
name = "x86-based Windows hosts"
description = "Windows hosts with x86/x64 architecture"

[[labels]]
name = "Debian-based Linux hosts"
description = "Ubuntu, Debian, and derivatives"

[[labels]]
name = "RPM-based Linux hosts"
description = "RedHat, CentOS, Fedora, and derivatives"

